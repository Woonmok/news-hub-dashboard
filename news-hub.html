<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Jinan News Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --surface-2: #f3f0ea;
      --border: #ddd7cc;
      --text: #1f1d18;
      --muted: #746f63;
      --primary: #01696f;
      --primary-2: #dbecee;
      --radius: 14px;
      --shadow: 0 8px 24px rgba(0,0,0,0.06);
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --max: 1200px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: var(--space-4);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .brand h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .feed-tabs {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: var(--space-4);
    }

    .tab {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: all .16s ease;
    }

    .tab:hover {
      border-color: #c8c0b3;
      background: #fcfbf8;
    }

    .tab.active {
      background: var(--primary-2);
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 700;
    }

    .main {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: var(--space-4);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 540px;
      overflow: hidden;
    }

    .card-head {
      padding: var(--space-4);
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to bottom, #fff, #fcfbf8);
    }

    .card-head h2 {
      margin: 0 0 6px 0;
      font-size: 18px;
    }

    .card-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .list {
      padding: var(--space-2);
      max-height: 680px;
      overflow: auto;
    }

    .item {
      padding: var(--space-3);
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }

    .item + .item {
      margin-top: 6px;
    }

    .item:hover {
      background: #faf8f4;
      border-color: #ece5d8;
    }

    .item.active {
      background: var(--primary-2);
      border-color: #a7cfd2;
    }

    .item-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.45;
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .detail {
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .detail-title {
      font-size: 22px;
      line-height: 1.35;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .detail-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .detail-desc {
      font-size: 15px;
      color: #38342d;
    }

    .detail-desc p {
      margin: 0;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
    }

    .link-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty, .loading, .error {
      padding: var(--space-4);
      color: var(--muted);
      font-size: 14px;
    }

    .footer-note {
      margin-top: var(--space-4);
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
      }
      .card {
        min-height: auto;
      }
      .list {
        max-height: 420px;
      }
      .detail-title {
        font-size: 19px;
      }
    }

    @media (max-width: 560px) {
      .wrap {
        padding: 12px;
      }
      .brand h1 {
        font-size: 22px;
      }
      .topbar {
        flex-direction: column;
      }
      .tab, .btn {
        width: 100%;
        text-align: left;
      }
      .feed-tabs, .actions {
        display: grid;
        grid-template-columns: 1fr;
      }
      .card-head {
        padding: 14px;
      }
      .detail {
        padding: 14px;
      }
      .item {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <h1>Jinan News Hub</h1>
        <p>진안군 · 전북 · 정치 · AI · 전국 뉴스를 한 화면에서 보는 RSS 허브</p>
      </div>
      <div class="actions">
        <button class="btn" id="refreshBtn">새로고침</button>
        <button class="btn primary" id="openOriginalBtn">원문 열기</button>
      </div>
    </header>

    <nav class="feed-tabs" id="tabs"></nav>

    <main class="main">
      <section class="card">
        <div class="card-head">
          <h2 id="listHeading">기사 목록</h2>
          <p id="listSub">탭을 선택하면 최신 RSS를 불러옵니다.</p>
        </div>
        <div class="list" id="list"></div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>기사 정보</h2>
          <p>선택한 기사 요약, 날짜, 출처, 원문 링크</p>
        </div>
        <div class="detail" id="detail">
          <div class="empty">왼쪽에서 기사를 선택하세요.</div>
        </div>
      </section>
    </main>

    <div class="footer-note">
      RSS 원본: 연합뉴스/연합뉴스TV 공식 RSS 및 Google News 검색 RSS. JSON 변환은 rss2json API를 사용합니다.
    </div>
  </div>

  <script>
    const feeds = [
      {
        id: "jinan",
        label: "진안군",
        source: "Google News RSS",
        rss: "https://news.google.com/rss/search?q=%EC%A7%84%EC%95%88%EA%B5%B0&hl=ko&gl=KR&ceid=KR:ko",
        note: "진안군 관련 기사 검색 결과"
      },
      {
        id: "jeonbuk",
        label: "전북",
        source: "Google News RSS",
        rss: "https://news.google.com/rss/search?q=%EC%A0%84%EB%B6%81%20OR%20%EC%A0%84%EB%B6%81%ED%8A%B9%EB%B3%84%EC%9E%90%EC%B9%98%EB%8F%84&hl=ko&gl=KR&ceid=KR:ko",
        note: "전북권 기사 검색 결과"
      },
      {
        id: "politics",
        label: "정치",
        source: "연합뉴스 RSS",
        rss: "https://www.yna.co.kr/rss/politics.xml",
        note: "연합뉴스 정치 공식 RSS"
      },
      {
        id: "localtv",
        label: "지역",
        source: "연합뉴스TV RSS",
        rss: "http://www.yonhapnewstv.co.kr/category/news/local/feed/",
        note: "연합뉴스TV 지역 공식 RSS"
      },
      {
        id: "ai",
        label: "AI",
        source: "Google News RSS",
        rss: "https://news.google.com/rss/search?q=AI%20OR%20%EC%9D%B8%EA%B3%B5%EC%A7%80%EB%8A%A5%20OR%20Perplexity%20OR%20OpenAI&hl=ko&gl=KR&ceid=KR:ko",
        note: "AI 및 주요 모델 관련 기사"
      },
      {
        id: "top",
        label: "전국",
        source: "연합뉴스 RSS",
        rss: "https://www.yna.co.kr/rss/news.xml",
        note: "연합뉴스 최신 기사"
      }
    ];

    const state = {
      activeFeedId: feeds[0].id,
      items: [],
      activeItem: null
    };

    const tabsEl = document.getElementById("tabs");
    const listEl = document.getElementById("list");
    const detailEl = document.getElementById("detail");
    const listHeadingEl = document.getElementById("listHeading");
    const listSubEl = document.getElementById("listSub");
    const refreshBtn = document.getElementById("refreshBtn");
    const openOriginalBtn = document.getElementById("openOriginalBtn");

    function getActiveFeed() {
      return feeds.find(feed => feed.id === state.activeFeedId);
    }

    function escapeHtml(str = "") {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function stripHtml(html = "") {
      const temp = document.createElement("div");
      temp.innerHTML = html;
      return (temp.textContent || temp.innerText || "").trim();
    }

    function shortText(text = "", limit = 220) {
      const cleaned = text.replace(/\s+/g, " ").trim();
      return cleaned.length > limit ? cleaned.slice(0, limit) + "..." : cleaned;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "날짜 없음";
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return d.toLocaleString("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderTabs() {
      tabsEl.innerHTML = "";
      feeds.forEach(feed => {
        const btn = document.createElement("button");
        btn.className = "tab" + (feed.id === state.activeFeedId ? " active" : "");
        btn.textContent = feed.label;
        btn.onclick = async () => {
          if (state.activeFeedId === feed.id) return;
          state.activeFeedId = feed.id;
          state.items = [];
          state.activeItem = null;
          renderTabs();
          renderLoading();
          await loadActiveFeed();
        };
        tabsEl.appendChild(btn);
      });
    }

    function renderLoading() {
      const feed = getActiveFeed();
      listHeadingEl.textContent = feed.label + " 기사 목록";
      listSubEl.textContent = feed.note;
      listEl.innerHTML = '<div class="loading">RSS를 불러오는 중입니다...</div>';
      detailEl.innerHTML = '<div class="loading">기사 정보를 준비하는 중입니다...</div>';
    }

    function renderError(message) {
      listEl.innerHTML = '<div class="error">' + escapeHtml(message) + '</div>';
      detailEl.innerHTML = '<div class="error">다른 탭을 눌러보거나 잠시 후 다시 시도하세요.</div>';
    }

    function renderList() {
      const feed = getActiveFeed();
      listHeadingEl.textContent = feed.label + " 기사 목록";
      listSubEl.textContent = feed.note;

      if (!state.items.length) {
        listEl.innerHTML = '<div class="empty">표시할 기사가 없습니다.</div>';
        detailEl.innerHTML = '<div class="empty">선택 가능한 기사가 없습니다.</div>';
        return;
      }

      listEl.innerHTML = "";
      state.items.forEach((item, idx) => {
        const el = document.createElement("article");
        const active = state.activeItem && state.activeItem.guid === item.guid;
        el.className = "item" + (active ? " active" : "");
        el.innerHTML = `
          <div class="item-title">${escapeHtml(item.title || "제목 없음")}</div>
          <div class="item-meta">
            <span>${escapeHtml(item.source || feed.source)}</span>
            <span>${escapeHtml(formatDate(item.pubDate))}</span>
          </div>
        `;
        el.onclick = () => {
          state.activeItem = item;
          renderList();
          renderDetail();
        };
        listEl.appendChild(el);

        if (!state.activeItem && idx === 0) {
          state.activeItem = item;
        }
      });

      renderListActiveState();
      renderDetail();
    }

    function renderListActiveState() {
      const nodes = [...listEl.querySelectorAll(".item")];
      nodes.forEach((node, idx) => {
        const item = state.items[idx];
        const active = state.activeItem && item.guid === state.activeItem.guid;
        node.classList.toggle("active", active);
      });
    }

    function renderDetail() {
      if (!state.activeItem) {
        detailEl.innerHTML = '<div class="empty">왼쪽에서 기사를 선택하세요.</div>';
        return;
      }

      const item = state.activeItem;
      const desc = shortText(stripHtml(item.description || item.content || "설명이 없습니다."), 500);
      const feed = getActiveFeed();

      detailEl.innerHTML = `
        <h3 class="detail-title">${escapeHtml(item.title || "제목 없음")}</h3>
        <div class="detail-meta">
          <span>${escapeHtml(item.source || feed.source)}</span>
          <span>${escapeHtml(formatDate(item.pubDate))}</span>
        </div>

        <div class="chips">
          <div class="chip">${escapeHtml(feed.label)}</div>
          <div class="chip">${escapeHtml(feed.source)}</div>
        </div>

        <div class="detail-desc">
          <p>${escapeHtml(desc)}</p>
        </div>

        <div class="link-row">
          <a class="btn primary" href="${item.link}" target="_blank" rel="noopener noreferrer">원문 보기</a>
          <a class="btn" href="${feed.rss}" target="_blank" rel="noopener noreferrer">RSS 보기</a>
        </div>
      `;
    }

    async function fetchRSS(feed) {
      const endpoint = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed.rss);
      const response = await fetch(endpoint);
      if (!response.ok) {
        throw new Error("RSS API 응답 실패");
      }
      const data = await response.json();

      if (data.status && data.status !== "ok") {
        throw new Error(data.message || "RSS 변환 실패");
      }

      const items = (data.items || []).map((item, idx) => ({
        guid: item.guid || item.link || `${feed.id}-${idx}`,
        title: item.title || "제목 없음",
        link: item.link || "#",
        pubDate: item.pubDate || "",
        description: item.description || "",
        content: item.content || "",
        source: item.author || data.feed?.title || feed.source
      }));

      return items.slice(0, 20);
    }

    async function loadActiveFeed() {
      const feed = getActiveFeed();
      try {
        const items = await fetchRSS(feed);
        state.items = items;
        state.activeItem = items[0] || null;
        renderList();
      } catch (err) {
        console.error(err);
        renderError(feed.label + " RSS를 불러오지 못했습니다.");
      }
    }

    refreshBtn.onclick = async () => {
      renderLoading();
      await loadActiveFeed();
    };

    openOriginalBtn.onclick = () => {
      if (state.activeItem && state.activeItem.link) {
        window.open(state.activeItem.link, "_blank", "noopener,noreferrer");
      } else {
        alert("먼저 기사를 선택하세요.");
      }
    };

    renderTabs();
    renderLoading();
    loadActiveFeed();
  </script>
</body>
</html>
