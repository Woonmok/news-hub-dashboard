<html lang="ko" data-theme="dark">

<meta name="generator" content="Perplexity Computer">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 허브 대시보드</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
:root {
  --font-body: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
  --text-xs: clamp(0.7rem, 0.65rem + 0.25vw, 0.8rem);
  --text-sm: clamp(0.8rem, 0.75rem + 0.25vw, 0.875rem);
  --text-base: clamp(0.875rem, 0.85rem + 0.15vw, 0.95rem);
  --text-lg: clamp(1rem, 0.95rem + 0.3vw, 1.15rem);
  --text-xl: clamp(1.25rem, 1.1rem + 0.75vw, 1.75rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-6: 1.5rem; --space-8: 2rem;
  --space-12: 3rem; --space-16: 4rem;
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
}

[data-theme="dark"] {
  --bg: #0f1114; --surface: #181a1f; --surface-2: #1e2027;
  --border: #2a2d35; --divider: #22252c;
  --text: #e2e4e8; --text-muted: #8b8f98; --text-faint: #555963;
  --accent: #4f98a3; --accent-hover: #5fb3bf;
  --cat-election: #e8725c; --cat-economy: #e8a44c; --cat-tech: #5ca3e8;
  --cat-society: #9c7ee8; --cat-farm: #5cc878;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}

[data-theme="light"] {
  --bg: #f4f5f7; --surface: #ffffff; --surface-2: #f9f9fb;
  --border: #e0e2e6; --divider: #ecedf0;
  --text: #1a1d23; --text-muted: #6b7080; --text-faint: #9ca1ad;
  --accent: #01696f; --accent-hover: #0c4e54;
  --cat-election: #c4402a; --cat-economy: #c07e1f; --cat-tech: #2a6db5;
  --cat-society: #6b4cc0; --cat-farm: #2a8c45;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--text);
  background: var(--bg);
  line-height: 1.6;
  min-height: 100dvh;
}

.container { max-width: 1080px; margin: 0 auto; padding: 0 var(--space-4); }

/* Header */
header {
  position: sticky; top: 0; z-index: 100;
  background: color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--divider);
  padding: var(--space-3) 0;
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-size: var(--text-lg); font-weight: 700;
  color: var(--text); text-decoration: none;
  display: flex; align-items: center; gap: var(--space-2);
}
.logo-icon { width: 28px; height: 28px; color: var(--accent); }
.header-meta {
  display: flex; align-items: center; gap: var(--space-4);
  font-size: var(--text-xs); color: var(--text-muted);
}
.theme-toggle {
  cursor: pointer; background: none; border: none;
  color: var(--text-muted); padding: var(--space-1);
  border-radius: var(--radius-sm);
  transition: color var(--transition);
}
.theme-toggle:hover { color: var(--text); }

/* Stats */
.stats-bar {
  display: flex; gap: var(--space-3); padding: var(--space-4) 0;
  flex-wrap: wrap;
}
.stat {
  display: flex; align-items: baseline; gap: var(--space-1);
  font-size: var(--text-sm); color: var(--text-muted);
}
.stat-value { font-weight: 700; font-size: var(--text-lg); color: var(--text); }

/* Category Tabs */
.tabs {
  display: flex; gap: var(--space-1); padding: var(--space-2) 0;
  border-bottom: 1px solid var(--divider);
  overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  cursor: pointer; background: none; border: none;
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-sm); color: var(--text-muted);
  border-radius: var(--radius-sm);
  white-space: nowrap;
  transition: all var(--transition);
  display: flex; align-items: center; gap: var(--space-1);
}
.tab:hover { color: var(--text); background: var(--surface); }
.tab.active { color: var(--text); background: var(--surface); font-weight: 600; }
.tab-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; flex-shrink: 0;
}
.tab-count {
  font-size: var(--text-xs); color: var(--text-faint);
  margin-left: var(--space-1);
}

/* Article List */
.articles { padding: var(--space-4) 0 var(--space-16); }
.article {
  padding: var(--space-4) 0;
  border-bottom: 1px solid var(--divider);
  animation: fadeIn 0.3s ease;
}
.article:last-child { border-bottom: none; }
.article-top {
  display: flex; align-items: center; gap: var(--space-2);
  margin-bottom: var(--space-2);
}
.article-category {
  font-size: var(--text-xs); font-weight: 600;
  padding: 2px var(--space-2); border-radius: var(--radius-sm);
  color: white; white-space: nowrap;
}
.article-source { font-size: var(--text-xs); color: var(--text-muted); }
.article-date { font-size: var(--text-xs); color: var(--text-faint); }
.article-title {
  font-size: var(--text-lg); font-weight: 600;
  line-height: 1.4; margin-bottom: var(--space-2);
}
.article-title a {
  color: var(--text); text-decoration: none;
  transition: color var(--transition);
}
.article-title a:hover { color: var(--accent); }
.article-summary {
  font-size: var(--text-sm); color: var(--text-muted);
  line-height: 1.7; max-width: 72ch;
}
.article-keywords {
  display: flex; gap: var(--space-1); margin-top: var(--space-2);
  flex-wrap: wrap;
}
.keyword {
  font-size: var(--text-xs); color: var(--text-faint);
  background: var(--surface-2); padding: 2px var(--space-2);
  border-radius: var(--radius-sm); border: 1px solid var(--border);
}

/* Empty state */
.empty {
  text-align: center; padding: var(--space-16) 0;
  color: var(--text-faint); font-size: var(--text-sm);
}
.empty-icon { font-size: 2rem; margin-bottom: var(--space-4); opacity: 0.5; }

/* Footer */
footer {
  border-top: 1px solid var(--divider);
  padding: var(--space-6) 0;
  text-align: center;
  font-size: var(--text-xs); color: var(--text-faint);
}
footer a { color: var(--text-muted); text-decoration: none; }
footer a:hover { color: var(--accent); }

/* Loading */
.loading { text-align: center; padding: var(--space-16) 0; color: var(--text-muted); }
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin: 0 auto var(--space-4);
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Mobile */
@media (max-width: 640px) {
  .stats-bar { gap: var(--space-4); }
  .stat { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>

<header>
  <div class="container header-inner">
    <a href="#" class="logo">
      <svg class="logo-icon" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="22" height="22" rx="4"/>
        <path d="M8 9h12M8 14h8M8 19h10"/>
      </svg>
      뉴스 허브
    </a>
    <div class="header-meta">
      <span id="updateTime">-</span>
      <button class="theme-toggle" data-theme-toggle aria-label="테마 전환">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="container">
  <div class="stats-bar">
    <div class="stat"><span class="stat-value" id="totalCount">0</span>전체</div>
    <div class="stat"><span class="stat-value" id="catCount">5</span>카테고리</div>
  </div>

  <nav class="tabs" id="tabs"></nav>
  <section class="articles" id="articles">
    <div class="loading"><div class="spinner"></div>뉴스를 불러오는 중...</div>
  </section>
</main>

<footer>
  <div class="container">
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
  </div>
</footer>

<script>
(function() {
  // Category config
  const CATS = {
    '선거/캠페인': { color: 'var(--cat-election)', icon: '🗳️' },
    '경제/산업':   { color: 'var(--cat-economy)',  icon: '📊' },
    '기술/과학':   { color: 'var(--cat-tech)',     icon: '💡' },
    '사회/문화':   { color: 'var(--cat-society)',   icon: '🏛️' },
    '농업/스마트팜': { color: 'var(--cat-farm)',    icon: '🌱' }
  };

  let newsData = null;
  let activeTab = 'all';

  // Theme toggle
  const toggle = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  root.setAttribute('data-theme', theme);

  toggle.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', theme);
    toggle.innerHTML = theme === 'dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });

  // Load data
  async function loadNews() {
    try {
      const resp = await fetch('data/news.json?t=' + Date.now());
      newsData = await resp.json();
      render();
    } catch (e) {
      document.getElementById('articles').innerHTML =
        '<div class="empty"><div class="empty-icon">📭</div>뉴스 데이터를 불러올 수 없습니다.<br>파이프라인을 실행해 주세요.</div>';
    }
  }

  function render() {
    if (!newsData) return;

    // Update time
    const dt = new Date(newsData.generated_at);
    document.getElementById('updateTime').textContent =
      dt.toLocaleDateString('ko-KR') + ' ' + dt.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

    // Count
    document.getElementById('totalCount').textContent = newsData.total_count;

    // Build all articles flat
    const allArticles = [];
    for (const [cat, items] of Object.entries(newsData.categories)) {
      for (const item of items) {
        allArticles.push({ ...item, category: cat });
      }
    }

    // Tabs
    const tabsEl = document.getElementById('tabs');
    let tabsHTML = `<button class="tab ${activeTab === 'all' ? 'active' : ''}" data-cat="all">전체 <span class="tab-count">${allArticles.length}</span></button>`;

    for (const [cat, cfg] of Object.entries(CATS)) {
      const count = (newsData.categories[cat] || []).length;
      tabsHTML += `<button class="tab ${activeTab === cat ? 'active' : ''}" data-cat="${cat}">
        <span class="tab-dot" style="background:${cfg.color}"></span>
        ${cfg.icon} ${cat}
        <span class="tab-count">${count}</span>
      </button>`;
    }
    tabsEl.innerHTML = tabsHTML;

    // Tab click
    tabsEl.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.cat;
        render();
      });
    });

    // Filter
    const filtered = activeTab === 'all' ? allArticles
      : allArticles.filter(a => a.category === activeTab);

    // Render articles
    const articlesEl = document.getElementById('articles');
    if (filtered.length === 0) {
      articlesEl.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>이 카테고리에 뉴스가 없습니다.</div>';
      return;
    }

    articlesEl.innerHTML = filtered.map(a => {
      const cfg = CATS[a.category] || { color: 'var(--text-faint)', icon: '📄' };
      const keywords = (a.keywords || []).map(k => `<span class="keyword">${k}</span>`).join('');
      return `<article class="article">
        <div class="article-top">
          <span class="article-category" style="background:${cfg.color}">${cfg.icon} ${a.category}</span>
          <span class="article-source">${a.source}</span>
          <span class="article-date">${a.published}</span>
        </div>
        <h3 class="article-title"><a href="${a.link}" target="_blank" rel="noopener">${a.title}</a></h3>
        <p class="article-summary">${a.summary}</p>
        <div class="article-keywords">${keywords}</div>
      </article>`;
    }).join('');
  }

  loadNews();
})();
</script>
</body>
</html>
